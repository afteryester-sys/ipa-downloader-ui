name: Build IPA Studio

on:
  push:
    branches: [main, "v0/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Read version from csproj
        id: version
        shell: pwsh
        run: |
          [xml]$proj = Get-Content src/IPAStudio.App/IPAStudio.App.csproj
          $v = ($proj.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1).Trim()
          if (-not $v) { $v = "0.0.0" }
          "value=$v" >> $env:GITHUB_OUTPUT
          Write-Host "App version: $v"

      - name: Restore
        run: dotnet restore IPAStudio.sln

      - name: Build
        run: dotnet build IPAStudio.sln -c Release --no-restore

      - name: Publish (self-contained win-x64)
        run: >
          dotnet publish src/IPAStudio.App/IPAStudio.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=false
          -o build/publish

      - name: Fetch tool binaries (ipatool, libimobiledevice)
        shell: pwsh
        run: ./build/Fetch-Tools.ps1 -OutDir build/publish/tools

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          # Inno Setup 6 is pre-installed on windows-latest runners.
          # Pass the version so OutputBaseFilename / AppVersion match the csproj.
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.version.outputs.value }}" build\installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPAStudio-Setup-${{ steps.version.outputs.value }}
          path: build/output/*.exe

      - name: Upload portable build artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPAStudio-Portable-${{ steps.version.outputs.value }}
          path: build/publish/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: IPAStudio-Setup-${{ needs.build.outputs.version }}
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
