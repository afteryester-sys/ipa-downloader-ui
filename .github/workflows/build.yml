name: Build IPA Studio

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore IPAStudio.sln

      - name: Build
        run: dotnet build IPAStudio.sln -c Release --no-restore

      - name: Publish (self-contained win-x64)
        run: >
          dotnet publish src/IPAStudio.App/IPAStudio.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=false
          -o build/publish

      - name: Fetch tool binaries (ipatool, libimobiledevice)
        shell: pwsh
        run: ./build/Fetch-Tools.ps1 -OutDir build/publish/tools

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          # Inno Setup 6 is pre-installed on windows-latest runners.
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" build\installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPAStudio-Setup
          path: build/output/*.exe

      - name: Upload portable build artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPAStudio-Portable
          path: build/publish/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: IPAStudio-Setup
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
