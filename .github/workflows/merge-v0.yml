# Triggered when v0 pushes to a v0/** branch.
# 1. Checks out main, merges the v0 branch into it.
# 2. Bumps the patch version directly on main (never writes back to v0/**).
# 3. Pushes main — this triggers auto-release.yml which builds the installer.
#
# Deliberately does NOT push anything back to the v0/** branch so that v0
# can always push cleanly on the next change.
name: Merge v0 branch into main

on:
  push:
    branches: ["v0/**"]

jobs:
  merge-and-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ---- Merge v0 branch into main (already on main) --------------------
      - name: Fetch v0 branch
        run: git fetch origin ${{ github.ref_name }}

      - name: Merge v0 branch
        run: |
          git merge --no-ff "origin/${{ github.ref_name }}" \
            -m "chore: merge ${{ github.ref_name }} -> main [auto]" \
            || true   # conflicts are rare; if they occur the job fails clearly

      # ---- Bump patch version in csproj on main ---------------------------
      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          FILE="src/IPAStudio.App/IPAStudio.App.csproj"
          CURRENT=$(grep -oP '(?<=<Version>)[^<]+' "$FILE" | head -1 | tr -d '[:space:]')
          echo "Current: $CURRENT"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "New: $NEW"
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"
          sed -i "s|<Version>${CURRENT}</Version>|<Version>${NEW}</Version>|g" "$FILE"

      - name: Commit version bump on main
        run: |
          git add src/IPAStudio.App/IPAStudio.App.csproj
          git diff --cached --quiet \
            || git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [auto]"

      # ---- Push main (triggers auto-release.yml) --------------------------
      - name: Push main
        run: git push origin main
